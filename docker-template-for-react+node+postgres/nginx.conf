# =============================================================================
# NGINX CONFIG TEMPLATE
# For: React / Vue / Svelte — any Single Page Application (SPA)
# =============================================================================
# HOW TO USE:
#   1. Copy this file into the same folder as your frontend Dockerfile
#   2. The Dockerfile copies it to /etc/nginx/conf.d/default.conf inside
#      the container — no changes needed to the Dockerfile for this.
#   3. This config works as-is for most SPAs. Edit only if you need
#      custom behaviour (API proxying, caching headers, HTTPS, etc.)
# =============================================================================

server {

    # -------------------------------------------------------------------------
    # Port Nginx listens on INSIDE the container
    # -------------------------------------------------------------------------
    # 80 is the standard HTTP port. This is the container-side port.
    # The host-side port (what you type in your browser) is set in
    # docker-compose.yml under "ports:" as "HOST_PORT:80".
    # -------------------------------------------------------------------------
    listen 80;

    # -------------------------------------------------------------------------
    # Where Nginx looks for files to serve
    # -------------------------------------------------------------------------
    # Must match the destination path in your Dockerfile:
    #   COPY --from=builder /app/dist /usr/share/nginx/html
    #                                  ↑ this path ↑
    # -------------------------------------------------------------------------
    root /usr/share/nginx/html;

    # -------------------------------------------------------------------------
    # Default file to serve when a directory is requested
    # -------------------------------------------------------------------------
    # When someone visits "/" (the root), serve index.html.
    # Vite always produces an index.html — this line is always needed.
    # -------------------------------------------------------------------------
    index index.html;

    # -------------------------------------------------------------------------
    # URL routing — THE most important block for SPAs
    # -------------------------------------------------------------------------
    # "location /" matches ALL incoming requests.
    #
    # try_files checks for files in this order:
    #   $uri      → look for an exact file matching the URL path
    #               e.g. /assets/main.js → serves the actual JS file ✓
    #   $uri/     → look for a directory (rarely used in SPAs, kept for safety)
    #   /index.html → if nothing matched, serve index.html
    #
    # WHY THE FALLBACK TO index.html IS CRITICAL:
    #   React Router uses client-side routing. When a user visits
    #   http://yoursite.com/dashboard directly (or refreshes the page),
    #   the browser asks Nginx for a file called "dashboard". That file
    #   doesn't exist — only index.html does. Without the fallback, Nginx
    #   returns 404. With it, Nginx serves index.html, React loads, reads
    #   the URL, and renders the correct page. React Router handles the rest.
    #
    # Static files (JS, CSS, images) are served directly by the $uri match
    # and never fall through to index.html — so they work correctly too.
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # =========================================================================
    # OPTIONAL BLOCKS — uncomment and edit as needed for your project
    # =========================================================================

    # -------------------------------------------------------------------------
    # OPTIONAL: Proxy API requests to the backend
    # -------------------------------------------------------------------------
    # If you want the frontend to call /api/... instead of http://localhost:3000/api/...
    # (useful to avoid CORS issues entirely)
    # Uncomment and replace <BACKEND_SERVICE_NAME> with your compose service name.
    # -------------------------------------------------------------------------
    # location /api/ {
    #     proxy_pass http://<BACKEND_SERVICE_NAME>:<BACKEND_PORT>/api/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # -------------------------------------------------------------------------
    # OPTIONAL: Cache static assets aggressively
    # -------------------------------------------------------------------------
    # Vite adds content hashes to filenames (e.g. main-DiwrgTda.js),
    # so it's safe to cache them for a long time.
    # -------------------------------------------------------------------------
    # location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
    #     expires 1y;
    #     add_header Cache-Control "public, immutable";
    # }

    # -------------------------------------------------------------------------
    # OPTIONAL: Custom error page
    # -------------------------------------------------------------------------
    # error_page 404 /index.html;
}
